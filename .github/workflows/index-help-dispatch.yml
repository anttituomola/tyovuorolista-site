name: Dispatch help content indexing

on:
  push:
    branches:
      - main
    paths:
      - 'src/pages/posts/**'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch indexing workflow
        env:
          GH_TOKEN: ${{ secrets.HELP_INDEX_DISPATCH_PAT }}
          OWNER: ${{ github.repository_owner }}
          SHA: ${{ github.sha }}
        run: |
          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${OWNER}/tyovuorolista/dispatches" \
            -d "{\"event_type\":\"help-content-updated\",\"client_payload\":{\"site_sha\":\"${SHA}\"}}"
